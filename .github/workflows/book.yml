name: deploy-book

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-book
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,book]"

      - name: Build English book
        run: jupyter-book build .

      - name: Build Korean book
        run: jupyter-book build ko/

      - name: Merge Korean build under /ko
        run: |
          mkdir -p _build/html/ko
          cp -r ko/_build/html/. _build/html/ko/

      - name: Deploy to Vercel (pqc.hulryung.com)
        run: |
          cd _build/html
          npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
